version: '3.8'

services:
  # ─── MongoDB ──────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: careflow-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    networks:
      - careflow-network
    restart: unless-stopped
    healthcheck:
      test: [ 'CMD', 'mongosh', '--eval', 'db.adminCommand("ping")' ]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Backend API ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: careflow-backend
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/careflow
      - JWT_SECRET=change-this-to-a-strong-secret-in-production
      - JWT_EXPIRE=7d
      - JWT_REFRESH_SECRET=change-this-refresh-secret-in-production
      - JWT_REFRESH_EXPIRE=7d
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - careflow-network
    restart: unless-stopped

  # ─── Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: careflow-frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - careflow-network
    restart: unless-stopped

networks:
  careflow-network:
    driver: bridge

volumes:
  mongodb_data:
